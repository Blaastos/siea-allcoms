1.1 Le SIEA. Syndicat Intercommunal d'énergie et d'é-communication de l'Ain (ci-après le SIEA) dont le siège se situe au 32 cours de Verdun - CS50208 - 01006 BOURG-EN-BRESSE Cedex Tél. 04 74 45 09 07 www.siea.fr - www.reseau-liain.fr est le Professionnel qui agit dans le contexte des présentes conditions générales.<br/><br/>
Le Client est propriétaire, co-propriétaire, ou locataire du local desservi par le Réseau Public Fibre Optique des communes de l'Ain, réseau géré par le SIEA, de qualité d'usager de la Fibre. Le Client prend connaissance des présentes conditions générales avant toute exécution des prestations de service.</p>
<p><b>Article 2 - Objet</b><br/>
Les présentes conditions couvrent les services de réparation sur le réseau public de fibre optique. Ces prestations consistent en la restauration des conditions optimales de réception par le Client de la fibre.</p>
<p><b>Article 3 - Conditions préalables de réalisation de la prestation</b><br/>
<b>3.1 Devis d'intervention :</b> La prestation à réaliser est définie et détaillée dans le document « devis d'intervention » réalisé dans les locaux du Client par le Technicien représentant le SIEA. Le Technicien informe par tous moyens de la nécessité d'une intervention chez le Client et sollicite et établit le devis lui-même, se déplace sur rendez-vous et remet au Client le devis d'intervention qu'il date et signe et remet au Client.<br/><br/>
Le devis est gratuit dès lors que les travaux d'intervention s'effectuent immédiatement après et dans les conditions précisées dans les présentes Conditions générales. Le devis se sera facturé la somme de 150 Euros TTC dans le cas où le Client ne souhaite pas une réparation immédiate. Le prix indiqué sur le devis est valable pendant une durée maximum d'UN MOIS.<br/><br/>
<b>3.2 INFORMATION SUR LE DROIT DE RÉTRACTATION POUR LES CLIENTS CONSOMMATEURS.</b><br/>
3.2.1 Dans la mesure où les travaux en cause ont la nature de travaux d'entretien et/ou de réparation à réaliser en urgence au local du Client consommateur, le Client consommateur sollicités par lui, ne bénéficie pas du droit de rétractation, dans la limite des pièces de rechange et travaux strictement nécessaires.<br/><br/>
3.2.2 Dans les cas où des prestations d'intervention ne relevant pas du cas d'urgence visé, le client consommateur dispose d'un délai de 14 jours calendaires à compter de la signature du devis pour exercer son droit de rétractation.<br/><br/>
3.2.3 Dans les cas où des travaux complémentaires n'ayant pas le caractère d'urgence sont proposés et acceptés par le Client, l'exécution de ces services pleinement acceptés avant la fin du délai de rétractation de 14 jours calendaires (tels que visés ci-après) sera réalisée après l'accord préalable exprès du Client et son renoncement exprès à son droit de rétractation.</p>
<p><b>Article 4 - Prix et conditions de règlement</b><br/>
4.1 Le prix des prestations de service est fixé dans le devis d'intervention. Une facture est adressée au Client après l'exécution de la prestation.<br/>
4.2 Le prix est payable sur la base d'un titre de recettes émis par la Paierie Départementale de l'Ain.<br/>
4.3 En cas de retard de paiement des sommes dues par le Client au-delà du délai fixé, des pénalités de retard calculées sur la base du taux d'intérêt légal sur le montant TTC de la prestation sont automatiquement appliquées sans formalités préalables ni mise en demeure.</p>
<p><b>Article 5 - Garanties</b><br/>
Les garanties légales des vices cachés et de non-conformité sont pleinement applicables, dans leurs conditions légales, en faveur du Client en ce qui concerne les pièces, les éléments ou appareils fournis dans le cadre de l'intervention.</p>
<p><b>Article 6 - Réserves - État des lieux de fin de travaux</b><br/>
Le Client doit signer contradictoirement avec le Technicien un état des lieux de fin de travaux afin d'inventorier toutes les réserves éventuelles. Dans ce cas, le SIEA s'engage à faire ses meilleurs efforts afin que le Client n'ait plus aucune réserve relative aux travaux.</p>
<p><b>Article 7 - Force majeure</b><br/>
Le SIEA ne pourra être tenu responsable ni défaillant pour tout retard ou inexécution consécutif à la survenance d'un cas de force majeure.</p>
<p><b>Article 8 - Médiation</b><br/>
Les assureurs respectifs du client et du SIEA seront les médiateurs en cas de nécessité.</p>
<p><b>Article 9 - Loi applicable</b><br/>
Les présentes conditions générales sont régies par la Loi française uniquement applicable entre le Client et le SIEA.</p>

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<style>
@page{size:A4 portrait;margin:0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;font-size:8.5px;color:#1a2332;background:#fff;}
.pg{padding:9mm 10mm 6mm;min-height:297mm;display:flex;flex-direction:column;}
.spacer{flex:1;}
.p2{page-break-before:always;}
.hdr{background:linear-gradient(120deg,#003F7D 0%,#1565C0 100%);color:#fff;display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:8px;}
.hdr-lg{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.14);padding:5px 8px;border-radius:6px;flex-shrink:0;}
.hdr-c{flex:1;text-align:center;}
.hdr-title{font-size:12px;font-weight:700;letter-spacing:.3px;line-height:1.35;}
.hdr-sub{font-size:7.5px;opacity:.8;margin-top:2px;text-transform:uppercase;letter-spacing:.8px;}
.hdr-ref{font-size:7.5px;opacity:.9;text-align:right;flex-shrink:0;line-height:1.7;}
.hdr-ref strong{display:block;font-size:9px;}
.st{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#1565C0;border-left:3px solid #1565C0;padding-left:5px;margin-bottom:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;}
.card{border:1px solid #d5e5f5;border-radius:7px;padding:7px 9px;background:#fafcff;}
.f{display:flex;align-items:flex-end;gap:3px;margin-bottom:3.5px;}
.fl{font-size:7px;font-weight:700;color:#5a6a7e;white-space:nowrap;}
.fv{flex:1;border-bottom:1.5px solid #a8bdd0;min-height:12px;padding:0 2px;font-size:8.5px;color:#1a2332;}
.notice{background:#fffbeb;border:1px solid #fbbf24;border-left:3px solid #f59e0b;border-radius:5px;padding:4px 8px;font-size:7.5px;color:#92400e;font-style:italic;margin-bottom:6px;}
.types{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.ton{padding:3px 9px;border-radius:11px;font-size:7.5px;font-weight:700;background:#003F7D;color:#fff;display:inline-flex;align-items:center;gap:3px;}
.toff{padding:3px 9px;border-radius:11px;font-size:7.5px;font-weight:400;background:#edf2f7;color:#a0aec0;border:1px solid #d5e5f5;display:inline-flex;align-items:center;gap:3px;}
.cb{width:9px;height:9px;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:8px;border-radius:2px;vertical-align:middle;line-height:1;}
.tbl{border-radius:7px;overflow:hidden;border:1px solid #d5e5f5;margin-bottom:5px;}
table{width:100%;border-collapse:collapse;}
thead th{background:linear-gradient(120deg,#003F7D,#1565C0);color:#fff;padding:5px 6px;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;text-align:center;border-right:1px solid rgba(255,255,255,.15);}
thead th:last-child{border-right:none;}
tbody tr:nth-child(even) td{background:#f4f8fd;}
tbody tr:nth-child(odd) td{background:#fff;}
td.td-desc{padding:3px 5px;font-size:7.5px;border-bottom:1px solid #e8f0f8;border-right:1px solid #e8f0f8;line-height:1.35;}
td.td-qty{padding:3px 5px;font-size:7.5px;border-bottom:1px solid #e8f0f8;border-right:1px solid #e8f0f8;text-align:center;font-weight:700;}
td.td-pu{padding:3px 5px;font-size:7.5px;border-bottom:1px solid #e8f0f8;border-right:1px solid #e8f0f8;text-align:right;white-space:nowrap;}
td.td-tot{padding:3px 5px;font-size:7.5px;border-bottom:1px solid #e8f0f8;text-align:right;font-weight:700;white-space:nowrap;color:#003F7D;}
.tr-total td{background:#deeeff !important;font-weight:700;font-size:8px;padding:4px 6px;border-top:2px solid #1565C0;}
.tbar{background:linear-gradient(120deg,#003F7D,#1565C0);color:#fff;border-radius:7px;padding:7px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.tbar-sub{font-size:7.5px;opacity:.85;display:flex;gap:14px;margin-top:2px;}
.tbar-amt{font-size:14px;font-weight:700;letter-spacing:-.3px;}
.acc{border:1px solid #d5e5f5;border-radius:7px;padding:7px 10px;display:grid;grid-template-columns:1fr 120px;gap:10px;margin-bottom:6px;background:#fafcff;}
.sig-lbl{font-size:7px;font-weight:700;color:#5a6a7e;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;text-align:center;}

// ─── SIGNATURE PAD
function SigPad({label,value,onChange}){
  const cv=useRef(null),drawing=useRef(false),last=useRef(null);
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    if(!open||!cv.current)return;
    const ctx=cv.current.getContext('2d');
    ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.current.width,cv.current.height);
    if(value){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=value;}
  },[open]);
  const pos=(e,c)=>{const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*(c.width/r.width),y:(s.clientY-r.top)*(c.height/r.height)};};
  const dn=e=>{e.preventDefault();drawing.current=true;last.current=pos(e,cv.current);};
  const dm=e=>{e.preventDefault();if(!drawing.current)return;const c=cv.current,ctx=c.getContext('2d'),p=pos(e,c);ctx.beginPath();ctx.strokeStyle='#1a1a2e';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.stroke();last.current=p;};
  const du=()=>{drawing.current=false;};
  const clr=()=>{const ctx=cv.current.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.current.width,cv.current.height);};
  const ok=()=>{onChange(cv.current.toDataURL('image/png'));setOpen(false);};
  return h('div',{style:{marginBottom:14}},
    h('label',{style:{display:'block',fontSize:11,color:'#8ab4cc',marginBottom:5,textTransform:'uppercase',letterSpacing:1,fontWeight:600}},label),
    !open
      ?h('div',{onClick:()=>setOpen(true),style:{width:'100%',height:80,background:'#0a0f1e',border:`2px dashed ${value?'#2EC4C4':'#1e2d4a'}`,borderRadius:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}},
          value?h('img',{src:value,style:{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}):h('div',{style:{textAlign:'center',color:'#8ab4cc'}},h('div',{style:{fontSize:24,marginBottom:4}},'✍️'),h('div',{style:{fontSize:11}},'Appuyer pour signer')))
      :h('div',{style:{background:'#0f1729',borderRadius:12,border:'1px solid #2EC4C4',padding:12}},
          h('div',{style:{fontSize:12,color:'#2EC4C4',fontWeight:700,marginBottom:8}},'✍️ Zone de signature'),
          h('canvas',{ref:cv,width:360,height:140,style:{width:'100%',height:140,background:'#fff',borderRadius:8,cursor:'crosshair',touchAction:'none',display:'block'},onMouseDown:dn,onMouseMove:dm,onMouseUp:du,onMouseLeave:du,onTouchStart:dn,onTouchMove:dm,onTouchEnd:du}),
          h('div',{style:{display:'flex',gap:8,marginTop:10}},
            h('button',{onClick:clr,style:{flex:1,padding:'8px 0',borderRadius:8,border:'none',background:'#ef444422',color:'#ef4444',fontWeight:700,fontSize:12,cursor:'pointer'}},'🗑 Effacer'),
            h('button',{onClick:()=>setOpen(false),style:{flex:1,padding:'8px 0',borderRadius:8,border:'none',background:'#1e2d4a',color:'#8ab4cc',fontWeight:700,fontSize:12,cursor:'pointer'}},'Annuler'),
            h('button',{onClick:ok,style:{flex:1,padding:'8px 0',borderRadius:8,border:'none',background:'#2EC4C4',color:'#0a0f1e',fontWeight:700,fontSize:12,cursor:'pointer'}},'✓ Valider'))));
}

// ─── SPLASH
function Splash({onDone}){
  const cv=useRef(null);
  const [ph,setPh]=useState(0);
  useEffect(()=>{
    const t=[400,1300,2300,3200].map((d,i)=>setTimeout(()=>{if(i<3)setPh(i+1);else onDone();},d));
    return()=>t.forEach(clearTimeout);
  },[]);
  useEffect(()=>{
    const c=cv.current;if(!c)return;
    const ctx=c.getContext('2d');c.width=c.offsetWidth;c.height=c.offsetHeight;
    const W=c.width,H=c.height;
    const nodes=Array.from({length:18},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:Math.random()*3+1}));
    let p=0,raf;
    const draw=()=>{
      p+=.007;ctx.clearRect(0,0,W,H);
      nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;});
      const bx=(p%1)*W,g=ctx.createLinearGradient(bx-100,0,bx+100,0);
      g.addColorStop(0,'transparent');g.addColorStop(.5,'rgba(46,196,196,.5)');g.addColorStop(1,'transparent');
      ctx.strokeStyle=g;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,H/2);ctx.bezierCurveTo(W*.25,H*.3,W*.75,H*.7,W,H/2);ctx.stroke();
      nodes.forEach((a,i)=>nodes.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<120){ctx.strokeStyle=`rgba(123,45,139,${.4*(1-d/120)})`;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}));
      nodes.forEach(n=>{ctx.fillStyle='#2EC4C4';ctx.shadowColor='#2EC4C4';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
      raf=requestAnimationFrame(draw);
    };
    draw();return()=>cancelAnimationFrame(raf);
  },[]);
  return h('div',{style:{position:'fixed',inset:0,background:'#0a0f1e',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:1000,opacity:ph===3?0:1,transition:'opacity .6s',pointerEvents:ph===3?'none':'all'}},
    h('canvas',{ref:cv,style:{position:'absolute',inset:0,width:'100%',height:'100%'}}),
    h('div',{style:{position:'relative',textAlign:'center',padding:'0 20px'}},

}

// ─── NAV
const TABS=[{id:'home',l:'Accueil',i:'⌂'},{id:'expertise',l:'Expertise',i:'🔍'},{id:'fiche',l:'EDL',i:'📋'},{id:'devis',l:'Devis',i:'💶'},{id:'history',l:'Historique',i:'📁'}];
function Nav({active,onChange}){
  return h('div',{style:{position:'fixed',bottom:0,left:0,right:0,background:'#0f1729',borderTop:'1px solid #1e2d4a',display:'flex',zIndex:100,paddingBottom:'env(safe-area-inset-bottom,6px)'}},
    TABS.map(t=>h('button',{key:t.id,onClick:()=>onChange(t.id),style:{flex:1,padding:'8px 2px 5px',background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:1,color:active===t.id?'#2EC4C4':'#8ab4cc',transition:'color .2s',position:'relative'}},
      h('span',{style:{fontSize:18}},t.i),
      h('span',{style:{fontSize:9,fontWeight:active===t.id?700:400}},t.l),
      active===t.id&&h('div',{style:{position:'absolute',bottom:0,width:24,height:2,background:'linear-gradient(90deg,#2EC4C4,#7B2D8B)',borderRadius:2}})
    ))
  );
}

// ─── HOME
function Home({reports,onNav}){
  const bt=t=>reports.filter(r=>r.type===t).length;
  const recent=reports.slice(-3).reverse();
  const acts=[
    {l:'Expertise FTTH',sub:'Compte rendu contradictoire',i:'🔍',col:'#2EC4C4',nav:'expertise'},
    {l:'Fiche Intervention EDL',sub:'Reprise référentiel technique',i:'📋',col:'#7B2D8B',nav:'fiche'},
    {l:'Devis Maintenance Fibre',sub:'Intervention SIEA / Liain',i:'💶',col:'#f59e0b',nav:'devis'},
  ];
  return h('div',{style:pg},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',padding:'16px 0 24px'}},
      h('img',{src:LOGO,alt:'Allcoms',style:{height:44}})),
    h('div',{style:{textAlign:'center',marginBottom:24}},
      h('div',{style:{fontSize:22,fontWeight:800,background:'linear-gradient(135deg,#2EC4C4,#7B2D8B)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'Outil Terrain FTTH'),
      h('div',{style:{color:'#8ab4cc',fontSize:12,marginTop:4}},'Technologies · Travaux Publics')),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:20}},
      [['expertise','🔍','#2EC4C4','Expertises'],['fiche','📋','#7B2D8B','Fiches'],['devis','💶','#f59e0b','Devis']].map(([type,icon,col,lbl])=>
        h('div',{key:type,style:{background:'#0f1729',borderRadius:12,border:`1px solid ${col}44`,padding:'12px 8px',textAlign:'center'}},
          h('div',{style:{fontSize:20}},icon),
          h('div',{style:{fontSize:24,fontWeight:800,color:col}},bt(type)),
          h('div',{style:{fontSize:10,color:'#8ab4cc'}},lbl)))),
    h('div',{style:{fontSize:11,color:'#8ab4cc',letterSpacing:2,textTransform:'uppercase',marginBottom:10}},'Nouveau rapport'),
    ...acts.map(a=>h('button',{key:a.nav,onClick:()=>onNav(a.nav),style:{width:'100%',display:'flex',alignItems:'center',gap:14,background:'#0f1729',border:`1px solid ${a.col}44`,borderRadius:12,padding:'14px 16px',marginBottom:10,cursor:'pointer',textAlign:'left'}},
      h('div',{style:{width:44,height:44,borderRadius:10,flexShrink:0,background:a.col+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}},a.i),
      h('div',null,h('div',{style:{color:'#e8f4f8',fontWeight:600,fontSize:14}},a.l),h('div',{style:{color:'#8ab4cc',fontSize:11,marginTop:2}},a.sub)),
      h('div',{style:{marginLeft:'auto',color:a.col,fontSize:18}},'›'))),
    
    // ── Simfora + Install buttons ──
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
      h('a',{href:'https://simfora.liain.fr/',target:'_blank',rel:'noopener',
        style:{display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          padding:'13px 12px',borderRadius:12,textDecoration:'none',
          background:'linear-gradient(135deg,#0060BF,#003F7D)',
          boxShadow:'0 4px 16px rgba(0,96,191,0.35)',
          color:'#fff',fontWeight:700,fontSize:13,transition:'all .2s'}},
        h('span',{style:{fontSize:20}},'🔗'),
        h('div',null,
          h('div',{style:{fontSize:13,fontWeight:800,letterSpacing:.3}},'SIMFORA'),
          h('div',{style:{fontSize:10,opacity:.8,fontWeight:400}},'Liain · Ouvrir')
        )
      ),
      h('button',{
        id:'installBtn',
        onClick:()=>{
          if(window.__installPrompt){
            window.__installPrompt.prompt();
            window.__installPrompt.userChoice.then(r=>{
              if(r.outcome==='accepted') document.getElementById('installBtn').style.display='none';
            });
          } else {
            // iOS fallback
            alert('Pour installer :\n\n📱 iOS Safari : bouton Partager → "Sur l\'écran d\'accueil"\n🤖 Android Chrome : menu ⋮ → "Ajouter à l\'écran d\'accueil"');
          }
        },
        style:{display:'flex',alignItems:'center',justifyContent:'center',gap:8,
          padding:'13px 12px',borderRadius:12,border:'none',cursor:'pointer',
          background:'linear-gradient(135deg,#2EC4C4,#7B2D8B)',
          boxShadow:'0 4px 16px rgba(46,196,196,0.3)',
          color:'#fff',fontWeight:700,fontSize:13,width:'100%',transition:'all .2s'}},
        h('span',{style:{fontSize:20}},'📲'),
        h('div',null,
          h('div',{style:{fontSize:13,fontWeight:800,letterSpacing:.3}},'Installer'),
          h('div',{style:{fontSize:10,opacity:.8,fontWeight:400}},"App sur l'écran")
        )
      )
    ),
    recent.length>0&&h('div',null,
      h('div',{style:{fontSize:11,color:'#8ab4cc',letterSpacing:2,textTransform:'uppercase',margin:'16px 0 10px'}},'Récents'),
      ...recent.map(r=>h('div',{key:r.id,style:{background:'#0f1729',borderRadius:10,border:'1px solid #1e2d4a',padding:'10px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:10}},
        h('span',{style:{fontSize:16}},r.type==='expertise'?'🔍':r.type==='devis'?'💶':'📋'),
        h('div',{style:{flex:1}},
          h('div',{style:{color:'#e8f4f8',fontSize:13,fontWeight:600}},r.type==='expertise'?`Expertise — ${r.data?.oc||'—'}`:r.type==='devis'?`Devis — ${r.data?.clientNom||'—'} ${r.data?.clientPrenom||''}`:`EDL — PM: ${r.data?.nomPM||'—'}`),
          h('div',{style:{color:'#8ab4cc',fontSize:11}},r.date)))))
  );
}

// ─── HISTORY
function History({reports,onDelete,onEdit}){
  const [filter,setFilter]=useState('all');
  const fil=reports.filter(r=>filter==='all'||r.type===filter).slice().reverse();
  const tc=t=>t==='expertise'?'#2EC4C4':t==='devis'?'#f59e0b':'#7B2D8B';
  return h('div',{style:pg},
    h('div',{style:{fontSize:18,fontWeight:800,color:'#e8f4f8',marginBottom:16}},'Historique'),
    h('div',{style:{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}},
      [['all','Tout'],['expertise','Expertises'],['fiche','Fiches'],['devis','Devis']].map(([v,l])=>
        h('button',{key:v,onClick:()=>setFilter(v),style:{padding:'6px 12px',borderRadius:20,border:'none',cursor:'pointer',fontSize:11,fontWeight:600,background:filter===v?'#2EC4C4':'#0f1729',color:filter===v?'#0a0f1e':'#8ab4cc'}},l))),
    fil.length===0
      ?h('div',{style:{textAlign:'center',padding:'40px 20px',color:'#8ab4cc'}},h('div',{style:{fontSize:40,marginBottom:12}},'📭'),h('div',null,'Aucun rapport'))
      :h('div',null,...fil.map(r=>h('div',{key:r.id,style:{background:'#0f1729',borderRadius:12,border:'1px solid #1e2d4a',padding:14,marginBottom:10}},
          h('div',{style:{display:'flex',alignItems:'flex-start',gap:10}},
            h('span',{style:{fontSize:22}},r.type==='expertise'?'🔍':r.type==='devis'?'💶':'📋'),
            h('div',{style:{flex:1}},
              h('div',{style:{color:'#e8f4f8',fontWeight:700,fontSize:14}},r.type==='expertise'?`Expertise — OC: ${r.data?.oc||'—'}`:r.type==='devis'?`Devis — ${r.data?.clientNom||'—'} ${r.data?.clientPrenom||''}`:`EDL — PM: ${r.data?.nomPM||'—'}`),
              h('div',{style:{color:'#8ab4cc',fontSize:11,marginTop:2}},r.date),
              r.data?.refTicketOI&&h('div',{style:{color:tc(r.type),fontSize:11,marginTop:2}},`Ticket OI: ${r.data.refTicketOI}`),
              r.data?.numTicket&&h('div',{style:{color:tc(r.type),fontSize:11,marginTop:2}},`Ticket: ${r.data.numTicket}`),
              r.data?.rdvDate&&r.type==='devis'&&h('div',{style:{color:'#f59e0b',fontSize:11,marginTop:2}},`RDV: ${r.data.rdvDate}`),
              r.type==='expertise'&&h('div',{style:{display:'flex',gap:6,marginTop:4}},
                r.data?.sigOC&&h('span',{style:{fontSize:10,color:'#22c55e',background:'#22c55e22',padding:'2px 6px',borderRadius:4}},'✍️ Sig. OC'),
                r.data?.sigOI&&h('span',{style:{fontSize:10,color:'#22c55e',background:'#22c55e22',padding:'2px 6px',borderRadius:4}},'✍️ Sig. OI')))),
          h('div',{style:{display:'flex',gap:8,marginTop:10}},
            h('button',{onClick:()=>onEdit(r),style:{flex:1,padding:'7px 0',borderRadius:8,border:'none',background:'#2EC4C422',color:'#2EC4C4',fontWeight:600,fontSize:12,cursor:'pointer'}},'✏️ Modifier'),
            h('button',{onClick:()=>onDelete(r.id),style:{padding:'7px 14px',borderRadius:8,border:'none',background:'#ef444422',color:'#ef4444',fontWeight:600,fontSize:12,cursor:'pointer'}},'🗑️')))))
  );
}

function doPrint(html, filename) {
  // Use html2pdf if available for direct PDF download
  if (typeof html2pdf !== 'undefined') {
    const el = document.createElement('div');
    el.innerHTML = html;
    document.body.appendChild(el);
    // Extract page orientation from @page rule
    const isLandscape = html.includes('landscape');
    html2pdf().set({
      margin: 0,
      filename: filename || 'rapport.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, useCORS: true, logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: isLandscape ? 'landscape' : 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    }).from(el).save().then(() => { document.body.removeChild(el); });
  } else {
    // Fallback: open print dialog
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
    setTimeout(() => w.print(), 600);
  }
}

      h('div',{style:g2},h(Fld,{label:'Nom'},h(Inp,{value:d.techNom,onChange:s('techNom')})),h(Fld,{label:'Le (date)'},h(Inp,{type:'date',value:d.techLe,onChange:s('techLe')}))),
      h(Fld,{label:'A (lieu)'},h(Inp,{value:d.techA,onChange:s('techA')})),
      h('div',{style:{fontSize:12,color:'#7B2D8B',fontWeight:700,margin:'10px 0 8px'}},'Client'),
      h('div',{style:g2},h(Fld,{label:'A (lieu)'},h(Inp,{value:d.clientEtlA,onChange:s('clientEtlA')})),h(Fld,{label:'Le (date)'},h(Inp,{type:'date',value:d.clientEtlLe,onChange:s('clientEtlLe')}))),
      h(Fld,{label:'Observations (réserves)'},h(Txta,{value:d.observationsReserves,onChange:s('observationsReserves'),rows:2}))),
    h(Crd,null,h(SH,{title:'✍️ Signatures numériques'}),
      h('div',{style:g2},

        h('div',null,h('div',{style:{color:'#7B2D8B',fontSize:12,fontWeight:700,marginBottom:8,textAlign:'center'}},'Client'),h(SigPad,{label:'Signature client',value:d.sigClient,onChange:s('sigClient')})))),
    h('div',{style:g2},
      h(Btn,{onClick:save,bg:sv?'#22c55e':'linear-gradient(135deg,#2EC4C4,#7B2D8B)'},sv?'✓ Sauvegardé':'💾 Sauvegarder'),
      h(Btn,{onClick:()=>doPrint(buildDevisHTML(d),'devis_'+d.clientNom+'_'+d.rdvDate+'.pdf'),bg:'linear-gradient(135deg,#f59e0b,#e65100)'},'📄 Créer PDF')));
}

// ─── APP
function App(){
  const [splash,setSplash]=useState(true);
  const [tab,setTab]=useState('home');
  const [reports,setReports]=useState(loadR);
  const [editing,setEditing]=useState(null);
  const saveReport=(type,data)=>{
    setReports(prev=>{
      const u=editing?prev.map(r=>r.id===editing.id?{...r,data}:r):[...prev,{id:Date.now().toString(),type,date:new Date().toLocaleDateString('fr-FR'),data}];
      saveR(u);return u;
    });setEditing(null);
  };
  const edit=r=>{setEditing(r);setTab(r.type);};
  const del=id=>setReports(prev=>{const u=prev.filter(r=>r.id!==id);saveR(u);return u;});
  const nav=t=>{setEditing(null);setTab(t);};
  return h('div',{style:{background:'#0a0f1e',minHeight:'100vh',maxWidth:480,margin:'0 auto'}},
    splash&&h(Splash,{onDone:()=>setSplash(false)}),
    h('div',{style:{position:'sticky',top:0,zIndex:50,background:'#0f1729ee',backdropFilter:'blur(10px)',borderBottom:'1px solid #1e2d4a',padding:'8px 16px',display:'flex',alignItems:'center',justifyContent:'center'}},
      h('img',{src:LOGO,alt:'Allcoms',style:{height:28}})),
    h('div',{style:{overflowY:'auto'}},
      tab==='home'&&h(Home,{reports,onNav:nav}),
      tab==='expertise'&&h(ExpForm,{key:editing?.id||'nx',initial:editing?.data,onSave:d=>saveReport('expertise',d)}),
      tab==='fiche'&&h(FicheForm,{key:editing?.id||'nf',initial:editing?.data,onSave:d=>saveReport('fiche',d)}),
      tab==='devis'&&h(DevisForm,{key:editing?.id||'nd',initial:editing?.data,onSave:d=>saveReport('devis',d)}),
      tab==='history'&&h(History,{reports,onDelete:del,onEdit:edit})),
    h(Nav,{active:tab,onChange:nav}));
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));

</script>
